<tbody id="automation-table-body">
  {% for job in jobs %}
  <tr>
    <td>{{ job.label }}</td>
    <td>
      {% if job.config.is_enabled %}<span class="badge badge-success">활성</span>
      {% else %}<span class="badge badge-ghost">비활성</span>{% endif %}
    </td>
    <td>{{ job.config.cron_hour|stringformat:"02d" }}:{{ job.config.cron_minute|stringformat:"02d" }}</td>
    <td class="text-right">
      <button
        class="btn btn-ghost btn-xs"
        hx-get="{% url 'dashboard:automation-form' job.job_id %}"
        hx-target="#automation-table-body"
        hx-swap="outerHTML"
      >수정</button>
    </td>
  </tr>
  {% endfor %}
</tbody>
