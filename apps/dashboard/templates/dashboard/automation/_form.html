<tbody id="automation-table-body">
  <tr>
    <td colspan="4">
      <form
        hx-post="{% url 'dashboard:automation-update' job_id %}"
        hx-target="#automation-table-body"
        hx-swap="outerHTML"
        class="flex flex-wrap items-end gap-4 p-4 bg-base-200 rounded"
      >
        <span class="font-semibold">{{ label }}</span>
        <label class="form-control">
          <span class="label-text">활성화</span>
          {{ form.is_enabled }}
        </label>
        <label class="form-control">
          <span class="label-text">시(0-23)</span>
          {{ form.cron_hour }}
        </label>
        <label class="form-control">
          <span class="label-text">분(0-59)</span>
          {{ form.cron_minute }}
        </label>
        {% if form.non_field_errors or form.cron_hour.errors or form.cron_minute.errors %}
        <span class="text-error text-sm">
          {{ form.non_field_errors|join:", " }}
          {{ form.cron_hour.errors|join:", " }}
          {{ form.cron_minute.errors|join:", " }}
        </span>
        {% endif %}
        <div class="flex gap-2">
          <button
            type="button"
            class="btn btn-ghost btn-sm"
            hx-get="{% url 'dashboard:automation-table-body' %}"
            hx-target="#automation-table-body"
            hx-swap="outerHTML"
          >취소</button>
          <button type="submit" class="btn btn-primary btn-sm">저장</button>
        </div>
      </form>
    </td>
  </tr>
</tbody>
