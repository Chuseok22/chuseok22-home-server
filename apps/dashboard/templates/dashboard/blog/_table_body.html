<tbody id="post-table-body">
  {% for post in posts %}
  <tr>
    <td>{{ post.title }}</td>
    <td>{% if post.is_published %}<span class="badge badge-success">공개</span>{% else %}<span class="badge badge-ghost">비공개</span>{% endif %}</td>
    <td>{{ post.published_at|default:"-" }}</td>
    <td class="flex gap-2 justify-end">
      <button
        class="btn btn-ghost btn-xs"
        hx-get="{% url 'dashboard:post-update' post.pk %}"
        hx-target="#post-table-body"
        hx-swap="outerHTML"
      >수정</button>
      <button
        class="btn btn-ghost btn-xs text-error"
        hx-post="{% url 'dashboard:post-delete' post.pk %}"
        hx-target="#post-table-body"
        hx-swap="outerHTML"
        hx-confirm="'{{ post.title }}' 포스트를 삭제할까요?"
      >삭제</button>
    </td>
  </tr>
  {% empty %}
  <tr>
    <td colspan="4" class="text-center opacity-60">등록된 포스트가 없습니다.</td>
  </tr>
  {% endfor %}
</tbody>
