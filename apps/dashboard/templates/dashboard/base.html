{% load static %}
<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}관리자 대시보드{% endblock %}</title>
  <script>
    (function () {
      const saved = localStorage.getItem('theme');
      if (saved) document.documentElement.setAttribute('data-theme', saved);
    })();
  </script>
  <link rel="stylesheet" href="{% static 'css/dist/styles.css' %}">
  <script src="https://unpkg.com/htmx.org@2.0.3" defer></script>
</head>
<body
  class="min-h-screen bg-base-100 text-base-content"
  hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
>
  <!-- hx-headers가 body 전체에 CSRF 토큰을 실어 모든 htmx 요청에 자동 첨부한다. -->
  <header class="border-b border-base-300">
    <nav class="navbar max-w-5xl mx-auto">
      <div class="flex-1">
        <a href="{% url 'dashboard:home' %}" class="font-mono font-bold text-lg">관리자 대시보드</a>
      </div>
      <div class="flex-none gap-2">
        <a href="{% url 'dashboard:home' %}" class="btn btn-ghost btn-sm">홈</a>
        <a href="{% url 'site:home' %}" class="btn btn-ghost btn-sm">사이트로 이동</a>
        <a href="{% url 'account_logout' %}" class="btn btn-ghost btn-sm">로그아웃</a>
      </div>
    </nav>
  </header>
  <main class="max-w-5xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
