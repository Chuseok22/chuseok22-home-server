<tbody id="project-table-body">
  <tr>
    <td colspan="5">
      <form
        hx-post="{% if project %}{% url 'dashboard:project-update' project.pk %}{% else %}{% url 'dashboard:project-create' %}{% endif %}"
        hx-target="#project-table-body"
        hx-swap="outerHTML"
        class="flex flex-col gap-2 p-4 bg-base-200 rounded"
      >
        {% for field in form %}
        <label class="form-control">
          <span class="label-text">{{ field.label }}</span>
          {{ field }}
          {% if field.errors %}<span class="text-error text-sm">{{ field.errors|join:", " }}</span>{% endif %}
        </label>
        {% endfor %}
        <div class="flex gap-2 justify-end">
          <button
            type="button"
            class="btn btn-ghost btn-sm"
            hx-get="{% url 'dashboard:project-table-body' %}"
            hx-target="#project-table-body"
            hx-swap="outerHTML"
          >취소</button>
          <button type="submit" class="btn btn-primary btn-sm">저장</button>
        </div>
      </form>
    </td>
  </tr>
</tbody>
