<tbody id="project-table-body">
  {% for project in projects %}
  <tr>
    <td>{{ project.get_category_display }}</td>
    <td>{{ project.title }}</td>
    <td>{{ project.get_status_display }}</td>
    <td>{{ project.order }}</td>
    <td class="flex gap-2 justify-end">
      <button
        class="btn btn-ghost btn-xs"
        hx-get="{% url 'dashboard:project-update' project.pk %}"
        hx-target="#project-table-body"
        hx-swap="outerHTML"
      >수정</button>
      <button
        class="btn btn-ghost btn-xs text-error"
        hx-post="{% url 'dashboard:project-delete' project.pk %}"
        hx-target="#project-table-body"
        hx-swap="outerHTML"
        hx-confirm="'{{ project.title }}' 프로젝트를 삭제할까요?"
      >삭제</button>
    </td>
  </tr>
  {% empty %}
  <tr>
    <td colspan="5" class="text-center opacity-60">등록된 프로젝트가 없습니다.</td>
  </tr>
  {% endfor %}
</tbody>
