{% extends "dashboard/base.html" %}

{% block title %}프로젝트 관리{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-6">
  <h1 class="text-2xl font-bold">프로젝트 관리</h1>
  <button
    class="btn btn-primary btn-sm"
    hx-get="{% url 'dashboard:project-create' %}"
    hx-target="#project-table-body"
    hx-swap="outerHTML"
  >새 프로젝트</button>
</div>
<div class="overflow-x-auto">
  <table class="table">
    <thead>
      <tr>
        <th>분류</th>
        <th>제목</th>
        <th>상태</th>
        <th>순서</th>
        <th></th>
      </tr>
    </thead>
    {% include "dashboard/projects/_table_body.html" %}
  </table>
</div>
{% endblock %}
