{% extends "site/base.html" %}

{% block title %}Blog — 백지훈{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold mb-6">Blog</h1>
<div class="flex flex-col gap-4">
  {% for post in posts %}
  <article>
    <a href="{% url 'site:blog-detail' post.slug %}" class="text-lg font-semibold link link-hover">
      {{ post.title }}
    </a>
    <p class="opacity-70 text-sm">{{ post.summary }}</p>
  </article>
  {% empty %}
  <p class="opacity-60">등록된 글이 없습니다.</p>
  {% endfor %}
</div>
{% endblock %}
